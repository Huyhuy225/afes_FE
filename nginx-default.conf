server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    charset utf-8;

    # Redirect root to app
    location = / {
        return 302 /afes_FE/;
    }

    # Cache headers for index
    location = /afes_FE/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # SPA routes under /afes_FE must fall back to index.html
    location /afes_FE/ {
        try_files $uri $uri/ /afes_FE/index.html;
    }

    # Keep root redirect for convenience
    location / {
        try_files $uri $uri/ /afes_FE/index.html;
    }

    # Reverse proxy to backend (internal)
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
