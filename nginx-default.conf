server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    charset utf-8;

    # Mở đúng app (Vite base: /afes_FE/)
    location = / {
        return 302 /afes_FE/;
    }

    # Tránh trình duyệt giữ index.html cũ sau docker build — hay gây "không thấy nút mới"
    location = /afes_FE/index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
